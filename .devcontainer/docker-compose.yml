services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    ports:
      - "3000:3000"   # server
      - "5173:5173"   # frontend (vite)
      - "5555:5555"   # prisma studio
    depends_on:
      db:
        condition: service_healthy

  db:
    image: ankane/pgvector:latest
    container_name: padagaskar-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: padagaskar
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d padagaskar"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
